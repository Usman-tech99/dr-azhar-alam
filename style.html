<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. Azhar Alam â€” Bariatric & Laparoscopic Surgeon, Lahore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* â”€â”€â”€ CSS Variables â”€â”€â”€ */
    :root {
      --navy: #0A1628;
      --navy-mid: #112240;
      --navy-light: #1a3a6b;
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-pale: #F5E6C0;
      --white: #FFFFFF;
      --off-white: #F8F6F1;
      --text-dark: #0D1B2A;
      --text-muted: #5C6B7A;
      --radius: 14px;
      --shadow: 0 8px 40px rgba(10, 22, 40, 0.13);
      --shadow-lg: 0 20px 70px rgba(10, 22, 40, 0.22);
      --transition: 0.35s cubic-bezier(.4, 0, .2, 1);
    }

    /* â”€â”€â”€ Reset â”€â”€â”€ */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text-dark);
      background: var(--white);
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    ul {
      list-style: none;
    }

    /* â”€â”€â”€ Utility â”€â”€â”€ */
    .urdu {
      font-family: 'Noto Nastaliq Urdu', serif;
      direction: rtl;
      text-align: right;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(201, 168, 76, .1);
      border: 1px solid rgba(201, 168, 76, .3);
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 16px;
    }

    .section-label::before {
      content: '';
      width: 18px;
      height: 2px;
      background: var(--gold);
      border-radius: 2px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700;
      line-height: 1.2;
      color: var(--navy);
      margin-bottom: 16px;
    }

    .section-sub {
      font-size: .97rem;
      color: var(--text-muted);
      line-height: 1.8;
      max-width: 560px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 14px 30px;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid transparent;
      transition: var(--transition);
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy);
      border-color: var(--gold);
    }

    .btn-gold:hover {
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(201, 168, 76, .4);
    }

    .btn-outline {
      background: transparent;
      color: var(--white);
      border-color: rgba(255, 255, 255, .5);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, .1);
      border-color: var(--white);
    }

    /* â”€â”€â”€ Scroll Reveal â”€â”€â”€ */
    .reveal {
      opacity: 0;
      transform: translateY(36px);
      transition: opacity .65s ease, transform .65s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-left {
      opacity: 0;
      transform: translateX(-36px);
      transition: opacity .65s ease, transform .65s ease;
    }

    .reveal-left.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .reveal-right {
      opacity: 0;
      transform: translateX(36px);
      transition: opacity .65s ease, transform .65s ease;
    }

    .reveal-right.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .delay-1 {
      transition-delay: .1s !important;
    }

    .delay-2 {
      transition-delay: .2s !important;
    }

    .delay-3 {
      transition-delay: .3s !important;
    }

    .delay-4 {
      transition-delay: .4s !important;
    }

    .delay-5 {
      transition-delay: .5s !important;
    }

    /* â”€â”€â”€ NAV â”€â”€â”€ */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 0 24px;
      transition: background var(--transition), box-shadow var(--transition);
    }

    nav.scrolled {
      background: rgba(10, 22, 40, .96);
      backdrop-filter: blur(14px);
      box-shadow: 0 2px 30px rgba(0, 0, 0, .3);
    }

    .nav-inner {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-logo-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--navy);
      font-weight: 700;
    }

    .nav-logo-text {
      line-height: 1.2;
    }

    .nav-logo-text strong {
      display: block;
      font-size: .95rem;
      font-weight: 700;
      color: var(--white);
    }

    .nav-logo-text span {
      font-size: .72rem;
      color: var(--gold-light);
      letter-spacing: .04em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-links a {
      font-size: .84rem;
      font-weight: 500;
      color: rgba(255, 255, 255, .75);
      padding: 8px 14px;
      border-radius: 6px;
      transition: color var(--transition), background var(--transition);
    }

    .nav-links a:hover {
      color: var(--gold-light);
      background: rgba(255, 255, 255, .07);
    }

    .nav-cta {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy) !important;
      font-weight: 600 !important;
      border-radius: 50px !important;
      padding: 9px 22px !important;
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(201, 168, 76, .4);
      background: linear-gradient(135deg, var(--gold-light), var(--gold)) !important;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: var(--transition);
    }

    .hamburger.open span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }

    .hamburger.open span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.open span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 72px;
      left: 0;
      right: 0;
      background: var(--navy);
      padding: 20px 24px 28px;
      z-index: 999;
      border-top: 1px solid rgba(255, 255, 255, .08);
    }

    .mobile-menu.open {
      display: block;
    }

    .mobile-menu a {
      display: block;
      padding: 12px 0;
      font-size: .95rem;
      color: rgba(255, 255, 255, .85);
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    .mobile-menu a:last-child {
      border: none;
    }

    /* â”€â”€â”€ HERO â”€â”€â”€ */
    #hero {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 70% 50%, rgba(201, 168, 76, .12) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(26, 58, 107, .5) 0%, transparent 55%),
        linear-gradient(145deg, #0A1628 0%, #112240 55%, #0E2050 100%);
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .hero-grid-lines {
      position: absolute;
      inset: 0;
      opacity: .04;
      background-image:
        linear-gradient(rgba(255, 255, 255, 1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 1) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .hero-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }

    .hero-orb-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(201, 168, 76, .18) 0%, transparent 70%);
      right: -100px;
      top: -100px;
    }

    .hero-orb-2 {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(26, 58, 107, .6) 0%, transparent 70%);
      left: -50px;
      bottom: 0;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1180px;
      margin: 0 auto;
      padding: 100px 24px 60px;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 60px;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(201, 168, 76, .15);
      border: 1px solid rgba(201, 168, 76, .35);
      color: var(--gold-light);
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 50px;
      margin-bottom: 22px;
    }

    .hero-badge i {
      font-size: .7rem;
    }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5.5vw, 4rem);
      font-weight: 700;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .hero-name span {
      color: var(--gold-light);
    }

    .hero-title {
      font-size: clamp(.9rem, 2vw, 1.05rem);
      font-weight: 400;
      color: rgba(255, 255, 255, .65);
      letter-spacing: .04em;
      margin-bottom: 24px;
    }

    .hero-tagline-en {
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      font-weight: 500;
      color: var(--white);
      line-height: 1.55;
      margin-bottom: 10px;
    }

    .hero-tagline-ur {
      font-size: clamp(1rem, 2vw, 1.15rem);
      color: var(--gold-pale);
      line-height: 1.9;
      margin-bottom: 30px;
    }

    .hero-rating {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .12);
      padding: 10px 20px;
      border-radius: 50px;
      margin-bottom: 34px;
    }

    .hero-stars {
      color: var(--gold);
      font-size: .95rem;
      letter-spacing: 2px;
    }

    .hero-rating-text {
      font-size: .85rem;
      color: rgba(255, 255, 255, .75);
    }

    .hero-rating-text strong {
      color: var(--white);
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    /* Hero card */
    .hero-card {
      background: rgba(255, 255, 255, .06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 24px;
      padding: 36px 32px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
    }

    .hc-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      color: var(--navy);
      font-weight: 700;
      margin: 0 auto 20px;
      font-family: 'Playfair Display', serif;
      box-shadow: 0 0 0 6px rgba(201, 168, 76, .2);
    }

    .hc-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--white);
      text-align: center;
      margin-bottom: 4px;
    }

    .hc-spec {
      font-size: .78rem;
      color: var(--gold-light);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 24px;
    }

    .hc-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: rgba(255, 255, 255, .1);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .hc-stat {
      background: rgba(255, 255, 255, .04);
      padding: 14px 8px;
      text-align: center;
    }

    .hc-stat strong {
      display: block;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold-light);
      line-height: 1.2;
    }

    .hc-stat span {
      font-size: .7rem;
      color: rgba(255, 255, 255, .55);
    }

    .hc-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
    }

    .hc-tag {
      font-size: .72rem;
      padding: 4px 12px;
      border-radius: 50px;
      background: rgba(201, 168, 76, .12);
      border: 1px solid rgba(201, 168, 76, .25);
      color: var(--gold-light);
      font-weight: 500;
    }

    /* â”€â”€â”€ ABOUT â”€â”€â”€ */
    #about {
      padding: 100px 0;
      background: var(--off-white);
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 70px;
      align-items: center;
    }

    .about-img-wrap {
      position: relative;
      display: flex;
      justify-content: center;
    }

    .about-img-bg {
      width: 340px;
      height: 420px;
      border-radius: 24px;
      background: linear-gradient(145deg, var(--navy), var(--navy-light));
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }

    .about-img-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 30%, rgba(201, 168, 76, .25) 0%, transparent 55%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1' fill='rgba(255,255,255,0.08)'/%3E%3C/svg%3E");
    }

    .about-img-icon {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .about-img-icon i {
      font-size: 4rem;
      color: var(--gold-light);
      opacity: .5;
    }

    .about-img-icon p {
      font-size: .85rem;
      color: rgba(255, 255, 255, .4);
    }

    .about-badge-float {
      position: absolute;
      bottom: 30px;
      right: -20px;
      background: var(--white);
      border-radius: 14px;
      padding: 14px 18px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .12);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .abf-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--navy);
      font-size: 1.1rem;
    }

    .abf-text strong {
      display: block;
      font-size: .9rem;
      color: var(--navy);
      font-weight: 700;
    }

    .abf-text span {
      font-size: .72rem;
      color: var(--text-muted);
    }

    .about-text .section-sub {
      margin-bottom: 30px;
    }

    .specialty-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 10px;
    }

    .specialty-card {
      background: var(--white);
      border: 1px solid rgba(10, 22, 40, .07);
      border-radius: var(--radius);
      padding: 18px 16px;
      display: flex;
      align-items: flex-start;
      gap: 13px;
      transition: var(--transition);
      cursor: default;
    }

    .specialty-card:hover {
      border-color: var(--gold);
      box-shadow: 0 6px 24px rgba(201, 168, 76, .15);
      transform: translateY(-3px);
    }

    .sc-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold-light);
      font-size: 1rem;
    }

    .specialty-card:hover .sc-icon {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy);
    }

    .sc-text strong {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.3;
    }

    .sc-text span {
      font-size: .75rem;
      color: var(--text-muted);
    }

    /* â”€â”€â”€ WHY CHOOSE â”€â”€â”€ */
    #why {
      padding: 100px 0;
      background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 100%);
      position: relative;
      overflow: hidden;
    }

    #why::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: .04;
      background:
        radial-gradient(circle at 80% 20%, var(--gold) 0%, transparent 35%),
        radial-gradient(circle at 15% 80%, var(--gold-light) 0%, transparent 30%);
    }

    .why-header {
      text-align: center;
      margin-bottom: 60px;
    }

    .why-header .section-title {
      color: var(--white);
    }

    .why-header .section-sub {
      color: rgba(255, 255, 255, .55);
      margin: 0 auto;
    }

    .why-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .why-card {
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .09);
      border-radius: 20px;
      padding: 32px 24px;
      text-align: center;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .why-card::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      transform: scaleX(0);
      transition: var(--transition);
      transform-origin: left;
    }

    .why-card:hover {
      background: rgba(255, 255, 255, .09);
      transform: translateY(-6px);
    }

    .why-card:hover::before {
      transform: scaleX(1);
    }

    .why-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 20px;
      background: rgba(201, 168, 76, .12);
      border: 1px solid rgba(201, 168, 76, .25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: var(--gold);
      transition: var(--transition);
    }

    .why-card:hover .why-icon {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy);
      border-color: transparent;
    }

    .why-card h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 10px;
    }

    .why-card p {
      font-size: .83rem;
      color: rgba(255, 255, 255, .5);
      line-height: 1.7;
    }

    /* â”€â”€â”€ REVIEWS â”€â”€â”€ */
    #reviews {
      padding: 100px 0;
      background: var(--white);
    }

    .reviews-header {
      text-align: center;
      margin-bottom: 60px;
    }

    .reviews-header .section-sub {
      margin: 0 auto;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .review-card {
      background: var(--off-white);
      border: 1px solid rgba(10, 22, 40, .07);
      border-radius: 20px;
      padding: 32px 28px;
      position: relative;
      transition: var(--transition);
    }

    .review-card:hover {
      box-shadow: var(--shadow);
      border-color: rgba(201, 168, 76, .3);
      transform: translateY(-4px);
    }

    .review-card::before {
      content: '"';
      position: absolute;
      top: 16px;
      right: 22px;
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      color: rgba(201, 168, 76, .18);
      line-height: 1;
    }

    .review-stars {
      color: var(--gold);
